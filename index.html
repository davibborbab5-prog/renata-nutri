<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta Nutricional</title>
    <link rel="stylesheet" href="./static/style.css">
</head>

<body>

    <div class="container">

        <div class="form-box">

            <h1>Consulta Nutricional Personalizada</h1>

            <p class="subtitle">
                Preencha as informações abaixo para que o atendimento seja
                individualizado, estratégico e alinhado à sua realidade.
            </p>

            <p class="confidential">
                🔒 Todas as informações são confidenciais e utilizadas exclusivamente
                para acompanhamento nutricional.
            </p>

            <form>

                <label>Nome completo *</label>
                <input type="text" required>

                <label>Data de nascimento *</label>
                <input type="date" required>

                <label>Cidade e Estado *</label>
                <input type="text" required>

                <label>Número de WhatsApp *</label>
                <input type="tel" required>

                <label>Seu e-mail *</label>
                <input type="email" required>

                <label>CPF *</label>
                <input type="text" required>

                <label>Ocupação *</label>
                <input type="text" required>

                <label>Qual o seu principal objetivo? *</label>
                <select required>
                    <option value="">Selecione</option>
                    <option>Hipertrofia</option>
                    <option>Emagrecimento</option>
                    <option>Melhora de hábitos alimentares</option>
                    <option>Vegetarianismo/Veganismo</option>
                    <option>Melhora no desempenho esportivo</option>
                    <option>Questões de saúde</option>
                    <option>Outro</option>
                </select>

                <label>Questões de saúde (opcional)</label>
                <textarea class="textarea-padrao"
                    placeholder="Ex: Diabetes Tipo 1, Diabetes Tipo 2, Hipertensão, Dislipidemia, Deficiências nutricionais..."
                    rows="4"></textarea>

                <label>Faz atividade física? Se sim, qual(is)? *</label>
                <input type="text" required>

                <label>Modalidade de atendimento *</label>
                <select required>
                    <option value="">Selecione</option>
                    <option>Presencial</option>
                    <option>Online</option>
                    <option>Híbrido (Presencial + Online)</option>
                </select>

                <button type="submit">Enviar informações</button>

            </form>

        </div>

    </div>

</body>
</html>
