<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta Nutricional</title>
    <link rel="stylesheet" href="./static/style.css">
</head>

<body>

    <div class="container">
        <div class="form-box">

            <h1>Consulta Nutricional Personalizada</h1>

            <p class="subtitle">
                Preencha as informações abaixo para que o atendimento seja
                individualizado, estratégico e alinhado à sua realidade.
            </p>

            <p class="confidential">
                🔒 Todas as informações são confidenciais e utilizadas exclusivamente
                para acompanhamento nutricional.
            </p>

            <form action="https://docs.google.com/forms/d/e/1FAIpQLSeM7OjIsnIfNPGTxE1bOk32LC7NEud_pMus8zYa7Jx8XNLqtw/formResponse" method="POST" target="_blank">

                <label>Nome completo *</label>
                <input type="text" name="entry.399246261" required>

                <label>Data de nascimento *</label>
                <input type="number" name="entry.309653785_day" placeholder="Dia" required>
                <input type="number" name="entry.309653785_month" placeholder="Mês" required>
                <input type="number" name="entry.309653785_year" placeholder="Ano" required>

                <label>Cidade e Estado *</label>
                <input type="text" name="entry.2035700166" required>

                <label>Número de WhatsApp *</label>
                <input type="tel" name="entry.1339065434" required>

                <label>Seu e-mail *</label>
                <input type="email" name="entry.1820943321" required>

                <label>CPF *</label>
                <input type="text" name="entry.163218932" required>

                <label>Ocupação *</label>
                <input type="text" name="entry.976673594" required>

                <label>Qual o seu principal objetivo? *</label>
                <select name="entry.2037954303" required>
                    <option value="">Selecione</option>
                    <option value="Hipertrofia">Hipertrofia</option>
                    <option value="Emagrecimento">Emagrecimento</option>
                    <option value="Melhora de hábitos alimentares">Melhora de hábitos alimentares</option>
                    <option value="Vegetarianismo/Veganismo">Vegetarianismo/Veganismo</option>
                    <option value="Melhora no desempenho esportivo">Melhora no desempenho esportivo</option>
                    <option value="Questões de saúde">Questões de saúde</option>
                    <option value="Outro">Outro</option>
                </select>

                <label>Questões de saúde (opcional)</label>
                <textarea name="entry.650808859"
                    placeholder="Ex: Diabetes, hipertensão, dislipidemia..."
                    rows="4"></textarea>

                <label>Faz atividade física? Se sim, qual(is)? *</label>
                <input type="text" name="entry.746840864" required>

                <label>Modalidade de atendimento *</label>
                <select name="entry.800647162" required>
                    <option value="">Selecione</option>
                    <option value="Presencial">Presencial</option>
                    <option value="Online">Online</option>
                    <option value="Híbrido (Presencial + Online)">Híbrido (Presencial + Online)</option>
                </select>

                <button type="submit">Enviar informações</button>

            </form>

        </div>
    </div>

</body>
</html>
